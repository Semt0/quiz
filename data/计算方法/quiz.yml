    answer: 收敛，极限值为 √a，具有三阶收敛速度。
    explanation: 此迭代是求解 x²-a=0 的 Halley 方法等价形式。令 φ(x)=x(x²+3a)/(3x²+a)，可验证 φ(√a)=√a。在
      x*=√a 处，φ'(x*)=0，φ''(x*)=0，φ'''(x*)≠0，三阶收敛。也可令 en=xn-√a 直接证明 e_{n+1}=en³/(3xn²+a)=O(en³)。
