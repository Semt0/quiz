    answer: 三阶收敛 (p=3)，这是 Halley 方法的等价形式。
    explanation: 在单根 x* 处 Taylor 展开。记 e=x-x*，a=f'(x*)，b=f''(x*)，c=f'''(x*)。f=ae+be²/2+ce³/6+O(e⁴)。计算
