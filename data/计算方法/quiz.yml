    question: 直接说出三种求解 ODE 初值问题的显式方法的名称。
    answer: Euler 法、改进 Euler 法（Heun 法）、经典四阶 Runge-Kutta 方法。（或：中点法、Adams-Bashforth
      方法）
    explanation: 常见 ODE 显式方法：(1) Euler 法（一阶，最简单）；(2) 改进 Euler 法/Heun 法（二阶，PEC 结构）；(3)
      经典四阶 Runge-Kutta（四阶，最常用）；(4) 中点方法（二阶 RK）；(5) Adams-Bashforth（多步显式法）。显式方法特点是不需解隐式方程，直接代入即可计算下一步。
    keywords:
