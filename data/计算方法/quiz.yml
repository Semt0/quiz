    question: RK 方法：k1=hf(xn,yn), k2=hf(xn+αh,yn+αk1), k3=hf(xn+(1-α)h,yn+(1-α)k1),
      y_{n+1}=yn+(k2+k3)/2。求该方法的精度阶数。
    answer: 对任意 α 均为二阶精度。
    explanation: 将 k2,k3 在 (xn,yn) 处 Taylor 展开：k2=hf+αh²(fx+fyf)+O(h³)，k3=hf+(1-α)h²(fx+fyf)+O(h³)。y_{n+1}=yn+hf+h²(fx+fyf)/2+O(h³)。而
      y(x_{n+1})=yn+hf+h²(fx+fyf)/2+O(h³)。两者 O(h²) 项系数相同，故局部截断误差 O(h³)，即二阶精度。α 在展开中被消去。
    keywords:
    - Runge-Kutta方法
    - 精度阶
    - Taylor展开
    - 局部截断误差
