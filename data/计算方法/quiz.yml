    question: 用 Newton 法求 √a 时有两种等价格式 φ1(x)=x/2+a/(2x) 和 φ2(x)=3x/2-x³/(2a)。若采用 x_{k+1}=c1·φ1(xk)+c2·φ2(xk)，求
      c1,c2 使该格式三阶收敛到 √a。
    answer: c1=-1/2, c2=3/2
    explanation: 令 g(x)=c1·φ1+c2·φ2。在 x*=√a 处展开。要求 g(x*)=x*（得 c1+c2=1），g'(x*)=0（二阶条件），g''(x*)=0（三阶条件）。φ1'(x*)=0，φ2'(x*)=?
      计算得 c1=-1/2, c2=3/2。这实际是 Halley 方法的一种线性组合表示。
