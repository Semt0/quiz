    question: 设存在 0<m≤f'(x)≤M 对 ∀x∈R 成立。则对任意 0<λ<2/M，迭代 x_{k+1}=xk-λf(xk) 均收敛至 f(x)=0
      的根。
    answer: true
    explanation: 此迭代对应 φ(x)=x-λf(x)，φ'(x)=1-λf'(x)。由 0<m≤f'(x)≤M 和 0<λ<2/M，有 1-λM≤φ'(x)≤1-λm<1，且
      1-λM>-1。故 |φ'(x)|<1，满足压缩映射条件，迭代全局收敛。这是松弛法收敛性的标准结论。
