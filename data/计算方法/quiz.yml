    chapter: 常微分方程初值问题的数值解法
    source: 25春期末_袁子峰.tex Q11
    question: 用梯形公式求解 y'+y=0, y(0)=1。给出 yk 的表达式，并证明 h→0 时数值解收敛到 y=e⁻ˣ。
    answer: yk = ((2-h)/(2+h))^k。当 h→0 且 kh=x 固定时，yk → e⁻ˣ。
    explanation: 梯形公式：y_{n+1}=yn+h[-yn-y_{n+1}]/2，整理得 y_{n+1}=yn·(2-h)/(2+h)。递推得 yk=((2-h)/(2+h))^k。令
      x=kh，ln yk = k·ln((2-h)/(2+h)) = k[-h-h³/12-...] = -x+O(h²)→ -x，故 yk→e⁻ˣ。
    keywords:
    - 梯形公式
    - ODE数值解
    - 收敛性
    - 解析解
