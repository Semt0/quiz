    question: 给出求非线性方程 f(x)=0 的 Newton 迭代法的迭代格式：x_{k+1} = __。
    answer: x_k - f(x_k)/f'(x_k)
    explanation: Newton 法通过对 f(x) 在 xk 处做一阶 Taylor 展开 f(x)≈f(xk)+f'(xk)(x-xk)，令其为零解得
      x_{k+1}=xk-f(xk)/f'(xk)。几何上是用切线代替曲线，以切线与 x 轴的交点作为下一次近似。单根附近具有二阶收敛。
