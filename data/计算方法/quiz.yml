    - 显式方法
    - Euler法
    - Runge-Kutta法
  - id: compute-ode-002
    type: short_answer
    difficulty: core
    chapter: 常微分方程初值问题的数值解法
    source: 25春期末_袁子峰.tex Q5
    question: 用文字简要叙述 Adams 内插法的构造思路。
    answer: Adams 内插法利用包含待求点 (x_{n+1},f_{n+1}) 在内的多个节点构造插值多项式来近似被积函数 f(x,y(x))，然后在
      [xn,x_{n+1}] 上积分得到 y_{n+1}。因插值节点包含待求区间右端点，是隐式多步法，比同阶 Adams 外推法稳定性和误差系数更优。
    explanation: Adams 内插法（Adams-Moulton）构造步骤：(1) 取包含 x_{n+1} 在内的历史节点（如 x_{n+1},xn,x_{n-1},...）；(2)
      以这些节点构造 f(x,y(x)) 的 Lagrange 插值多项式；(3) 将该多项式在 [xn,x_{n+1}] 上积分替代 ∫fdx；(4) 得
      y_{n+1}=yn+h(9f_{n+1}+19fn-5f_{n-1}+f_{n-2})/24（四阶情形）。因 y_{n+1} 同时出现在等式两端需迭代求解，故为隐式方法。
    keywords:
    - Adams内插法
    - 构造思路
    - 多步法
    - 隐式方法
    - 数值积分推导
  - id: compute-ode-003
    type: short_answer
