  - id: algo-random-008
    type: fill_blank
    difficulty: core
    question: MCMajority 算法中，若要求出错概率不超过 $\varepsilon$，则调用 Majority 的次数 $k$ 应满足：$k
      \geq$ ______。
    answer: $\lceil \log_2(1/\varepsilon) \rceil$
    explanation: BoolMajority 每次调用 Majority 的正确概率大于 1/2，错误概率小于 1/2。重复 $k$ 次后错误概率小于
      $(1/2)^k$。要使出错概率不超过 $\varepsilon$，需 $(1/2)^k \leq \varepsilon$，即 $k \geq \log_2(1/\varepsilon)$。取上整得
      $k \geq \lceil \log_2(1/\varepsilon) \rceil$。
