subject: 算法设计与分析
chapters:
- chapter: 动态规划
  source: 动态规划.md
  questions:
  - id: algo-dp-001
    type: single_choice
    difficulty: core
    question: 动态规划算法设计的关键步骤不包括以下哪一项？
    options:
    - 定义子问题
    - 建立递推关系
    - 证明贪心选择性质
    - 确定计算顺序
    answer: 2
    explanation: 证明贪心选择性质是贪心算法的设计步骤，不是动态规划的。动态规划的关键步骤包括：定义子问题、建立递推关系（状态转移方程）、确定计算顺序（自底向上或记忆化搜索）、以及构造最优解。
  - id: algo-dp-002
    type: true_false
    difficulty: core
    question: 动态规划要求问题具有最优子结构性质和重叠子问题性质。
    answer: true
    explanation: 动态规划适用的两个核心条件：最优子结构（optimal substructure）——问题的最优解包含子问题的最优解；重叠子问题（overlapping
      subproblems）——递归求解时会重复遇到相同的子问题。
  - id: algo-dp-003
    type: fill_blank
    difficulty: core
    question: 在 0-1 背包问题中，设 $dp[i][w]$ 表示前 $i$ 个物品、容量为 $w$ 时的最大价值，则状态转移方程为 $dp[i][w]
      = \max(dp[i-1][w], \_\_\_\_\_\_)$。
    answer: dp[i-1][w-w_i] + v_i
    explanation: 0-1 背包的状态转移方程为 $dp[i][w] = \max(dp[i-1][w], dp[i-1][w-w_i] + v_i)$，其中
      $w_i$ 和 $v_i$ 分别是第 $i$ 个物品的重量和价值。如果不选第 $i$ 个物品，则价值为 $dp[i-1][w]$；如果选，则价值为 $dp[i-1][w-w_i]
      + v_i$（要求 $w \geq w_i$）。
  - id: algo-dp-004
    type: short_answer
    difficulty: advanced
    question: 简述动态规划中"记忆化搜索"与"自底向上递推"两种实现方式的区别与适用场景。
    keywords:
    - 递归
    - 迭代
    - 栈空间
    - 子问题
    - 调用
    explanation: 记忆化搜索（memoization）采用递归+缓存的方式，只计算需要的子问题，适合子问题空间较大但实际访问较少的场景；自底向上递推（tabulation）采用迭代填充表格的方式，避免递归栈开销，适合所有子问题都需要求解的场景，且常数因子更小。
    answer: ''
  - id: algo-dp-005
    type: single_choice
    difficulty: advanced
    question: 最长公共子序列（LCS）问题中，设 $dp[i][j]$ 表示 $X[1..i]$ 和 $Y[1..j]$ 的 LCS 长度，若 $X[i]
      = Y[j]$，则递推关系为：
    options:
    - $dp[i][j] = dp[i-1][j-1] + 1$
    - $dp[i][j] = \max(dp[i-1][j], dp[i][j-1])$
    - $dp[i][j] = dp[i-1][j-1]$
    - $dp[i][j] = \max(dp[i-1][j], dp[i][j-1], dp[i-1][j-1] + 1)$
    answer: 0
    explanation: 当 $X[i] = Y[j]$ 时，当前字符可以加入 LCS，因此 $dp[i][j] = dp[i-1][j-1] + 1$。当
      $X[i] \neq Y[j]$ 时，$dp[i][j] = \max(dp[i-1][j], dp[i][j-1])$。
  - id: algo-dp-006
    type: true_false
    difficulty: core
    question: 动态规划的时间复杂度通常等于子问题个数乘以每个子问题的求解时间。
    answer: true
    explanation: 动态规划的时间复杂度一般可以表示为 $O(\text{子问题个数} \times \text{每个子问题的求解时间})$。例如 0-1
      背包有 $O(nW)$ 个子问题，每个子问题 $O(1)$ 时间，总复杂度 $O(nW)$。
  - id: algo-dp-007
    type: fill_blank
    difficulty: advanced
    question: 矩阵链乘法问题中，设 $dp[i][j]$ 表示计算矩阵 $A_i$ 到 $A_j$ 乘积的最小标量乘法次数，则递推式为 $dp[i][j]
      = \min_{i \leq k < j} \{ dp[i][k] + dp[k+1][j] + \_\_\_\_\_\_ \}$。
    answer: p_{i-1} p_k p_j
    explanation: 矩阵链乘法的递推式为 $dp[i][j] = \min_{i \leq k < j} \{ dp[i][k] + dp[k+1][j]
      + p_{i-1} p_k p_j \}$，其中 $p_{i-1} p_k p_j$ 是合并两个子链乘积的代价，$p_i$ 表示第 $i$ 个矩阵的维度。
  - id: algo-dp-008
    type: single_choice
    difficulty: core
    question: 以下哪个问题不适合用动态规划求解？
    options:
    - 最短路径问题（Dijkstra 算法）
    - 活动选择问题（贪心算法）
    - 0-1 背包问题
    - 最长递增子序列问题
    answer: 1
    explanation: 活动选择问题具有贪心选择性质，可以用贪心算法更高效地求解（按结束时间排序后依次选择相容活动），不需要动态规划。虽然动态规划也能解，但贪心更优。其他三个问题都常用动态规划求解。
  - id: algo-dp-009
    type: short_answer
    difficulty: core
    question: 简述动态规划中"状态压缩"技巧的基本思想。
    keywords:
    - 二进制
    - 子集
    - 位运算
    - 状态
    explanation: 状态压缩动态规划使用二进制数表示集合状态，每个二进制位对应一个元素是否被选取。通过位运算（如按位与、或、移位）高效地遍历和操作状态，适用于子集相关的
      DP 问题，如旅行商问题（TSP）的子集 DP 解法。
    answer: ''
  - id: algo-dp-010
    type: true_false
    difficulty: advanced
    question: 在有向无环图（DAG）上的最短路径问题可以用动态规划在 $O(V+E)$ 时间内求解。
    answer: true
    explanation: DAG 上的最短路径可以通过拓扑排序后按顺序进行动态规划求解，时间复杂度为 $O(V+E)$，优于一般图的 Dijkstra 算法（$O((V+E)\log
      V)$）或 Bellman-Ford 算法（$O(VE)$）。
- chapter: NP 完全
  source: NP 完全.md
  questions:
  - id: algo-np-011
    type: single_choice
    difficulty: core
    question: 以下哪个选项正确描述了 **P类** 的定义？
    options:
    - 所有多项式时间可解的判定问题组成的问题类
    - 所有多项式时间可验证的判定问题组成的问题类
    - 至少和某个NP完全问题一样难的问题类
    - 属于NP且所有NP问题都可多项式时间变换到它的问题类
    answer: 0
    explanation: 根据定义，P类是所有多项式时间可解的判定问题组成的问题类。选项B描述的是NP类，选项C描述的是NP-hard，选项D描述的是NP完全。
  - id: algo-np-012
    type: single_choice
    difficulty: core
    question: '**NP类**（Nondeterministic Polynomial）的正确定义是？'
    options:
    - 所有存在多项式时间算法的判定问题
    - 所有多项式时间可验证的判定问题组成的问题类
    - 所有至少和NP完全问题一样难的问题
    - 所有NP-hard且属于P的问题
    answer: 1
    explanation: NP类的定义是多项式时间可验证的判定问题组成的问题类。验证算法需要输入实例I和证据t，在多项式时间内输出Yes。选项A是P类，选项C是NP-hard，选项D是NP完全。
  - id: algo-np-013
    type: single_choice
    difficulty: core
    question: 关于**非确定型多项式时间算法**，下列说法正确的是？
    options:
    - 它是一种可以在多项式时间内求解所有NP问题的真实算法
    - 它先猜想一个证据，再验证该证据是否正确，且不是真正的算法
    - 它只能用于验证P类问题
    - 它的运行时间一定是指数级的
    answer: 1
    explanation: 非确定型多项式时间算法首先"猜想"一个证据t，然后检查t是否是证明I∈Y的证据。它**不是真正的算法**，只是一种理论模型。猜想和检查可以在多项式时间内完成，且当且仅当I∈Y时能够正确猜想到证据。
  - id: algo-np-014
    type: true_false
    difficulty: core
    question: '**P⊆NP**，即所有P类问题都属于NP类。'
    answer: true
    explanation: 根据定理，P⊆NP。因为如果一个判定问题有多项式时间算法（属于P），那么它显然也是多项式时间可验证的（属于NP）——算法本身就可以作为验证算法，不需要额外的证据。
  - id: algo-np-015
    type: single_choice
    difficulty: core
    question: 设判定问题Π₁=⟨D₁,Y₁⟩，Π₂=⟨D₂,Y₂⟩，函数f:D₁→D₂是Π₁到Π₂的**多项式时间变换**，则f必须满足的条件是？
    options:
    - f是多项式时间可计算的，且I∈Y₁⇔f(I)∈Y₂
    - f是指数时间可计算的，且I∈Y₁⇒f(I)∈Y₂
    - f是多项式时间可计算的，且I∈Y₁⇒f(I)∈Y₂
    - f是线性时间可计算的，且I∈Y₁⇔f(I)∈Y₂
    answer: 0
    explanation: 多项式时间变换要求：1) f是多项式时间可计算的；2) 对所有的I∈D₁，I∈Y₁⇔f(I)∈Y₂。即保持Yes实例的等价性。
  - id: algo-np-016
    type: single_choice
    difficulty: core
    question: '**Cook定理**指出以下哪个问题是NP完全的？'
    options:
    - 3-SAT
    - SAT（可满足性问题）
    - 顶点覆盖（VC）
    - 哈密顿回路（HC）
    answer: 1
    explanation: Cook定理指出SAT是NP完全的。这是NP完全性理论的基石，之后其他问题的NP完全性都通过多项式时间变换从SAT或3-SAT证明。
  - id: algo-np-017
    type: single_choice
    difficulty: advanced
    question: 要证明一个判定问题Π是**NP完全的**，正确的证明步骤是？
    options:
    - 证明Π∈NP，并选择一个已知NPC问题Π'，证明Π'≤ₚΠ
    - 证明Π∈P，并证明所有NP问题都可归约到Π
    - 证明Π∈NP，并证明Π≤ₚSAT
    - 证明Π是NP-hard，且Π∈P
    answer: 0
    explanation: 证明一个问题是NP完全的标准方法是：先证明它属于NP（通常容易，只需给出非确定型多项式时间算法或验证算法），再选择一个已知的NP完全问题，证明存在从该已知NP完全问题到目标问题的多项式时间变换（即该已知NP完全问题可多项式时间变换到目标问题）。
  - id: algo-np-018
    type: single_choice
    difficulty: advanced
    question: 证明**3-SAT是NP完全的**时，从SAT到3-SAT的多项式时间变换采用的主要技术是？
    options:
    - 局部替换法
    - 构件设计法
    - 限制法
    - 问题等价转换
    answer: 0
    explanation: 3-SAT的NP完全性证明使用**局部替换法**：将SAT中每个子句Cⱼ变换为等价的3文字子句集合Fⱼ'。对于长度为1、2、≥4的子句，分别引入新变元进行变换；长度为3的子句保持不变。
  - id: algo-np-019
    type: single_choice
    difficulty: advanced
    question: 证明**顶点覆盖（VC）是NP完全的**时，从3-SAT到VC的多项式时间变换采用的主要技术是？
    options:
    - 构件设计法
    - 局部替换法
    - 限制法
    - 问题等价转换
    answer: 0
    explanation: 证明顶点覆盖（VC）是NP完全时，采用**构件设计法**从3-SAT构造VC实例：构造变元构件（xᵢ与x̄ᵢ及边）、析取式构件（三角形）和联络边。K=n+2m，其中n是变元数，m是子句数。
  - id: algo-np-020
    type: true_false
    difficulty: advanced
    question: 若顶点覆盖（VC）是NP完全的，则**独立集（IS）和团（Clique）也是NP完全的**。
    answer: true
    explanation: 根据引理：V'是G的顶点覆盖 ⇔ V−V'是G的独立集 ⇔ V−V'是补图Gᶜ的团。因此这三个问题互相等价，既然VC是NP完全的，独立集和团也是NP完全的。
  - id: algo-np-021
    type: fill_blank
    difficulty: exam
    question: 对于搜索问题或优化问题，若存在NP完全问题π'使得π'∝ₜπ，则称π是______；若π可以Turing归约到某个NP问题，则称π是______。
    answer:
    - NP-hard
    - NP-easy
    explanation: NP-hard表示从多项式可计算的角度看，该问题至少和NPC问题一样难（存在NPC问题可Turing归约到它）。NP-easy表示该问题可以Turing归约到某个NP问题。一个搜索/优化问题若既是NP-hard又是NP-easy，则称为NP等价的。六个基本NPC问题对应的优化问题都是NP等价的。
  - id: algo-np-022
    type: short_answer
    difficulty: exam
    question: 简述**货郎优化问题（TSO）到判定问题（TSE）的Turing归约**的核心思想与算法步骤。
    answer: 二分查找确定最短旅行长度B*，再逐个城市尝试扩展部分旅行路线
    keywords:
    - 二分查找
    - 最短旅行长度
    - Turing归约
    - 部分旅行
    - 扩展
    - Minlength
    - FindSolution
    - 多项式调用次数
    explanation: 货郎优化问题（TSO）到判定问题（TSE）的Turing归约包含两个算法：1) Minlength算法用二分法在[Bₘᵢₙ,Bₘₐₓ]范围内确定最短旅行长度B*，每次调用TSE子程序s判断是否存在不超过B的全程旅行；2)
      FindSolution算法从⟨c₁⟩开始，逐个尝试将城市加入部分旅行路线，利用s判断是否可以扩展为全长不超过B*的全程旅行。总调用次数为O(m²)，是多项式的。
- chapter: 线性规划
  source: 线性规划.md
  questions:
  - id: algo-lp-001
    type: single_choice
    difficulty: core
    question: 以下哪个是线性规划标准形的正确形式？
    options:
    - $\max\ c^T x,\ \text{s.t.}\ Ax = b$
    - $\min\ c^T x,\ \text{s.t.}\ Ax = b,\ x \ge 0$
    - $\max\ c^T x,\ \text{s.t.}\ Ax = b,\ x \ge 0$
    - $\min\ c^T x,\ \text{s.t.}\ Ax \le b,\ x \ge 0$
    answer: 1
    explanation: 标准形要求目标函数为最小化，约束为等式，且所有变量非负。选项A缺少x≥0；选项C目标为最大化；选项D约束为不等式。
  - id: algo-lp-002
    type: single_choice
    difficulty: core
    question: 将最大化问题$\max\ c^T x$化为标准形的最小化形式，正确的变换是？
    options:
    - $\min\ c^T x$，并将约束$\le$改为$\ge$
    - $\min\ (-c)^T x$，约束不变
    - $\min\ c^T x$，并将$b$取负
    - $\max\ (-c)^T x$
    answer: 1
    explanation: 将$\max z$转化为$\min$时，应令$z' = -z$，即$c' = -c$，目标变为$\min -c^T x$。选项A直接改变约束方向错误；选项C和D的符号处理不正确。
  - id: algo-lp-003
    type: single_choice
    difficulty: core
    question: 对于约束$\sum_{j=1}^{n} a_{ij} x_j \le b_i$（$b_i \ge 0$），引入松弛变量后的标准形为？
    options:
    - $\sum a_{ij}x_j - s_i = b_i,\ s_i \ge 0$
    - $\sum a_{ij}x_j + s_i = b_i,\ s_i \ge 0$
    - $\sum a_{ij}x_j + s_i = b_i,\ s_i$自由
    - $\sum a_{ij}x_j = b_i + s_i,\ s_i \ge 0$
    answer: 1
    explanation: 松弛变量用于将$\le$不等式转化为等式：$\sum a_{ij}x_j + s_i = b_i$，其中$s_i \ge 0$。剩余变量用于$\ge$约束，人工变量用于构造初始可行基。
  - id: algo-lp-004
    type: true_false
    difficulty: core
    question: 判断：若线性规划标准形有最优解，则一定存在一个基本可行解（BFS）是最优解。
    answer: true
    explanation: 根据课件结论：若标准形LP有可行解，则必存在基本可行解；若有最优解，则必存在一个基本可行解是最优解。因此搜索顶点（BFS）即可。
  - id: algo-lp-005
    type: single_choice
    difficulty: advanced
    question: 在单纯形法中，判定问题无界（无最优解）的条件是？
    options:
    - 所有检验数$\lambda_j > 0$
    - 存在$\lambda_k < 0$，且所有$\alpha_{ik} > 0$
    - 存在$\lambda_k < 0$，且所有$\alpha_{ik} \le 0$
    - 存在$\lambda_k = 0$
    answer: 2
    explanation: 无界条件要求：存在检验数$\lambda_k < 0$（对最小化问题），且对应列$\alpha_k \le 0$（所有分量），这样增大$x_k$不会使任何基变量变为负，目标可无限下降。
  - id: algo-lp-006
    type: single_choice
    difficulty: core
    question: 单纯形法中的比值检验（选换出变量）公式为？
    options:
    - $\min\{ \beta_i / \alpha_{ik} \mid \alpha_{ik} < 0 \}$
    - $\max\{ \beta_i / \alpha_{ik} \mid \alpha_{ik} > 0 \}$
    - $\min\{ \beta_i \cdot \alpha_{ik} \mid \alpha_{ik} > 0 \}$
    - $\min\{ \beta_i / \alpha_{ik} \mid \alpha_{ik} > 0 \}$
    answer: 3
    explanation: 比值检验公式为$t^* = \min\{ \beta_i / \alpha_{ik} \mid \alpha_{ik} > 0 \}$，其中$\beta
      = B^{-1}b$。只有$\alpha_{ik} > 0$的分量才会限制$x_k$的增大。
  - id: algo-lp-007
    type: fill_blank
    difficulty: core
    question: 将一般形式LP化为标准形时，对于$\le$约束引入______，对于$\ge$约束引入______。
    answer:
    - 松弛变量
    - 剩余变量
    explanation: 松弛变量（slack variable）用于$\le$约束：$\sum a_{ij}x_j + s_i = b_i$；剩余变量（surplus
      variable）用于$\ge$约束：$\sum a_{ij}x_j - s_i = b_i$。两者都是将不等式转化为等式的工具。
  - id: algo-lp-008
    type: single_choice
    difficulty: advanced
    question: 设原始问题为$\max\ c^T x,\ \text{s.t.}\ Ax \le b,\ x \ge 0$，对偶问题为$\min\ b^T
      y,\ \text{s.t.}\ A^T y \ge c,\ y \ge 0$。若$x$原始可行、$y$对偶可行，则？
    options:
    - $c^T x \ge b^T y$
    - $c^T x \le b^T y$
    - $c^T x = b^T y$
    - $c^T x$与$b^T y$无固定关系
    answer: 1
    explanation: 根据弱对偶定理：对任意原始可行解$x$和对偶可行解$y$，有$c^T x \le b^T y$。因此原始最优值不超过对偶最优值。强对偶定理说明当两者都有最优解时最优值相等。
  - id: algo-lp-009
    type: fill_blank
    difficulty: advanced
    question: 对偶最优解$y_i^*$的经济解释是______，它衡量了约束资源$b_i$的______。
    answer:
    - 影子价格
    - 边际价值
    explanation: 对偶变量$y_i^*$的经济意义是影子价格（shadow price），表示第$i$条约束资源$b_i$增加1单位时最优值的边际变化量。它也被称为资源的边际价值。
  - id: algo-lp-010
    type: single_choice
    difficulty: core
    question: 在整数线性规划（ILP）的分支限界法中，LP松弛对最小化问题提供的是？
    options:
    - 下界（lower bound）
    - 上界（upper bound）
    - 精确最优值
    - 无解
    answer: 0
    explanation: 分支限界法先求解LP松弛。对最小化问题，松弛最优值是ILP最优值的下界（因为松弛扩大了可行域，最小值只能更小或相等）。若松弛解恰好全整数，则即为ILP最优解。
  - id: algo-lp-011
    type: single_choice
    difficulty: exam
    question: 对于最小顶点覆盖问题，LP松弛后取阈值$\{i \mid x_i \ge 1/2\}$构造的近似算法，其近似比为？
    options:
    - 2
    - $\ln |V|$
    - $|V|$
    - $1+\varepsilon$
    answer: 0
    explanation: 课件给出的2-近似算法：解LP松弛得$x_i \in [0,1]$，然后取$S = \{i \mid x_i \ge 1/2\}$。因为每条边$(i,j)$满足$x_i
      + x_j \ge 1$，所以至少有一个$\ge 1/2$，$S$必为顶点覆盖。且$|S| \le 2\sum x_i \le 2|S^*|$。
  - id: algo-lp-012
    type: fill_blank
    difficulty: advanced
    question: 在单纯形法中，$\lambda^T = c_N^T - c_B^T B^{-1}N$被称为______，它刻画了非基变量对目标函数的______影响。
    answer:
    - 检验数
    - 局部
    explanation: 在单纯形法中，$\lambda^T = c_N^T - c_B^T B^{-1}N$称为检验数（reduced cost / 约化成本）。它表示非基变量$x_N$每增加1单位对目标函数的影响。对最小化问题，若所有$\lambda_j
      \ge 0$，则当前BFS最优。
- chapter: 网络流
  source: 网络流.md
  questions:
  - id: algo-flow-001
    type: single_choice
    difficulty: core
    question: 在容量网络 $N = \langle V, E, c, s, t \rangle$ 中，一个流 $f$ 被称为可行流，必须满足哪些条件？
    options:
    - 仅需满足容量限制：$\forall \langle i, j \rangle \in E$，$f(i, j) \le c(i, j)$
    - 必须满足容量限制和平衡条件：中间点流入等于流出
    - 仅需满足平衡条件，容量可以暂时超出
    - 流量 $v(f)$ 必须等于最大流的流量
    answer: 1
    explanation: 根据定义2，可行流必须同时满足容量限制（每条边的流量不超过容量）和平衡条件（中间点流入等于流出）。仅满足容量限制不足以保证是可行流，因为还可能违反平衡条件。
  - id: algo-flow-002
    type: single_choice
    difficulty: core
    question: 根据最大流最小割定理，若 $f^*$ 是最大流，$(A^*, V-A^*)$ 是最小割集，则它们之间的关系是？
    options:
    - $v(f^*) = c(A^*, V-A^*)$
    - $v(f^*) < c(A^*, V-A^*)$
    - $v(f^*) > c(A^*, V-A^*)$
    - $v(f^*)$ 与割容量无关
    answer: 0
    explanation: 根据引理2，对任意可行流 $f$ 和任意割集 $(A, V-A)$，都有 $v(f) \le c(A, V-A)$。引理3进一步说明，当等号成立时，$f$
      就是最大流且该割是最小割。
  - id: algo-flow-003
    type: true_false
    difficulty: core
    question: 在 Dinic 算法中，极大流一定是最大流。
    answer: false
    explanation: 根据定义9，极大流是不存在前向增广链的可行流，但可能仍存在包含后向边的增广链。最大流必是极大流，但极大流不一定是最大流。因此"极大流一定是最大流"是错误的。
  - id: algo-flow-004
    type: fill_blank
    difficulty: core
    question: Dinic 算法通过构造 ______ 来同时沿多条最短增广链增广，从而将 Ford-Fulkerson 的伪多项式复杂度改进为强多项式
      $O(n^3)$。
    answer: 分层辅助网络
    explanation: Dinic 算法的核心思想是构造分层辅助网络 $AN(f)$，只保留最短的 $s$-$t$ 路径，然后在其中沿多条增广链同时增广求极大流。每阶段
      $AN(f)$ 中 $s$-$t$ 距离严格增大，保证至多 $n$ 个阶段。
  - id: algo-flow-005
    type: single_choice
    difficulty: advanced
    question: 关于 Ford-Fulkerson 算法的时间复杂度 $O(mC)$，下列说法正确的是？
    options:
    - $C$ 是图的边数，因此是多项式时间
    - $C$ 是最大流量，当容量为整数时算法一定在有限步内终止
    - 即使容量为整数，$O(mC)$ 也不是输入规模的多项式，因为 $C$ 可能指数于输入位数
    - 该复杂度与 Dinic 算法的 $O(n^3)$ 属于同一复杂度类
    answer: 2
    explanation: Ford-Fulkerson 算法的时间复杂度为 $O(mC)$，其中 $C$ 是最大流量。当容量为整数时，每次增广至少增加1单位流量，至多
      $C$ 个阶段，每阶段 $O(m)$。但这个复杂度不是输入规模的多项式，因为 $C$ 可能指数于输入位数（伪多项式）。Dinic 的 $O(n^3)$
      是强多项式。
  - id: algo-flow-006
    type: single_choice
    difficulty: advanced
    question: 在辅助网络 $N(f)$ 中，对于原网络中的边 $\langle i, j \rangle$ 且 $f(i, j) > 0$，其后向边
      $\langle j, i \rangle$ 的辅助容量 $ac(j, i)$ 等于？
    options:
    - $c(i, j)$
    - $c(i, j) - f(i, j)$
    - $f(i, j)$
    - $c(i, j) + f(i, j)$
    answer: 2
    explanation: 辅助网络 $N(f)$ 中的后向边 $\langle j, i \rangle$ 对应原网络中 $f(i,j) > 0$ 的边，其辅助容量为
      $ac(j,i) = f(i,j)$，表示可以退流的量。而 $c(i,j)-f(i,j)$ 是前向边 $\langle i,j \rangle$ 的辅助容量（剩余容量）。
  - id: algo-flow-007
    type: multiple_choice
    difficulty: advanced
    question: 设 $f$ 是容量-费用网络 $N$ 上的可行流，$g$ 是辅助网络 $N(f)$ 上的可行流，令 $f' = f + g$。下列等式成立的是？（多选）
    options:
    - $v(f') = v(f) + v(g)$
    - $v(f') = v(f)$
    - $w(f') = w(f) + w(g)$
    - $w(f') = w(f) + aw(g)$
    answer:
    - 0
    - 3
    explanation: 根据引理8，$f' = f + g$ 满足：1) 流量不变 $v(f') = v(f)$（因为 $g$ 是辅助网络中的可行流，不改变总流量）；2)
      费用关系 $w(f') = w(f) + aw(g)$。注意 $w(f')$ 不是简单的 $w(f) + w(g)$，而是要用辅助费用 $aw$。
  - id: algo-flow-008
    type: single_choice
    difficulty: exam
    question: 增广链定理指出：可行流 $f$ 是最大流的充要条件是？
    options:
    - $f$ 是零流
    - 不存在关于 $f$ 的 $s$-$t$ 增广链
    - 所有边都是饱和边
    - 存在某个割集 $(A, V-A)$ 使得 $v(f) = c(A, V-A)$
    answer: 1
    explanation: 增广链定理（定理1）指出：可行流 $f$ 是最大流当且仅当不存在关于 $f$ 的 $s$-$t$ 增广链。这是最大流理论的核心定理，也是
      Ford-Fulkerson 和 Dinic 算法终止条件的理论基础。
  - id: algo-flow-009
    type: fill_blank
    difficulty: core
    question: 在最小费用流的负回路算法中，通常使用 ______ 算法来检测辅助网络中的负回路。
    answer: Floyd
    explanation: 最小费用流的负回路算法需要检测辅助网络 $N(f)$ 中是否存在权 $aw$ 的负回路。由于辅助网络中可能存在负权边，使用 Floyd
      算法可以检测负回路（通过检查是否存在 $d^{(k)}(i,i) < 0$ 的情况）。
  - id: algo-flow-010
    type: single_choice
    difficulty: advanced
    question: Ford-Fulkerson 算法与 Dinic 算法在寻找增广路径时的主要区别是？
    options:
    - Ford-Fulkerson 找任意增广链，Dinic 在分层网络中找最短增广链并同时增广多条
    - Ford-Fulkerson 用 BFS，Dinic 用 DFS
    - Ford-Fulkerson 每次增广多条链，Dinic 每次只增广一条
    - 两者都使用相同的分层网络策略
    answer: 0
    explanation: Ford-Fulkerson 使用标号法（BFS/DFS 的变体）寻找任意一条增广链；Dinic 先用 BFS 构建分层辅助网络保留最短路径，然后在分层网络中找极大流。两者都涉及
      BFS，但 Dinic 的分层网络明确保留了最短路径结构。
  - id: algo-flow-011
    type: true_false
    difficulty: core
    question: 在带需求的流通问题中，若存在可行流通，则必有 $\sum_{v \in V} d_v = 0$。
    answer: true
    explanation: 根据命题2，如果存在带需求 $\{d_v\}$ 的可行流通，则所有需求之和必须为0。这是因为每条边的流量在其两个端点处一正一负，对所有顶点求和后全部抵消。这是可行流通存在的必要条件（但不是充分条件）。
  - id: algo-flow-012
    type: short_answer
    difficulty: advanced
    question: 简述如何将带需求的流通问题转化为单源单汇的最大流问题，并说明可行流通存在的判定条件。
    answer:
    - 添加超源点 $s^*$ 和超汇点 $t^*$
    - 从 $s^*$ 到每个发点 $v$ 加边，容量为 $-d_v$
    - 从每个收点 $v$ 到 $t^*$ 加边，容量为 $d_v$
    - '在改造后的网络中求 $s^*$-$t^*$ 最大流，若最大流值为 $D = \sum_{v: d_v > 0} d_v$，则存在可行流通'
    keywords:
    - 超源点
    - 超汇点
    - 发点
    - 收点
    - 最大流
    - 总需求
    explanation: 带需求流通转化为最大流的标准方法：1) 添加超源超汇；2) 超源到发点连边，容量为供给量；3) 收点到超汇连边，容量为需求量；4)
      求最大流，若等于总需求 $D$ 则可行。这是网络流建模的经典技巧。
  - id: algo-flow-013
    type: single_choice
    difficulty: exam
    question: 在图像分割问题中，将像素划分为前景 $A$ 和背景 $B$ 以最大化划分权值 $q(A, B)$，可以通过以下哪种方式求解？
    options:
    - 直接求解最大流问题
    - 转化为带需求的流通问题
    - 转化为最小割问题：最大化 $q(A,B)$ 等价于最小化割容量
    - 使用 Dinic 算法求极大流
    answer: 2
    explanation: 图像分割中，最大化划分权值 $q(A,B)$ 等价于最小化割容量 $c(A',B')$，因为 $c(A',B') = \sum_i
      a_i + \sum_i b_i - q(A,B)$，而 $\sum_i a_i + \sum_i b_i$ 是常数。因此通过求最小割可以得到最优的图像分割。
  - id: algo-flow-014
    type: short_answer
    difficulty: exam
    question: 请比较 Dinic 算法与 Ford-Fulkerson 算法在时间复杂度、增广策略和关键思想上的差异，并解释为什么 Dinic 能达到强多项式时间。
    answer: Dinic 算法的时间复杂度为 $O(n^3)$，是强多项式时间；Ford-Fulkerson 的时间复杂度为 $O(mC)$，是伪多项式时间。Dinic
      通过构造分层辅助网络 $AN(f)$，在每一阶段中沿多条最短增广链同时增广求极大流，每阶段 $s$-$t$ 距离严格增大，因此至多 $n$ 个阶段。Ford-Fulkerson
      每次只沿一条增广链增广，且对增广链的选择没有限制，可能导致需要很多次增广（如整数容量时最多 $C$ 次）。
    keywords:
    - $O(n^3)$
    - $O(mC)$
    - 强多项式
    - 伪多项式
    - 分层辅助网络
    - 极大流
    - 最短增广链
    - 标号法
    explanation: Dinic 算法通过分层网络和极大流策略，将复杂度从伪多项式改进为强多项式 $O(n^3)$。关键区别在于：Dinic 每阶段处理所有最短路径，而
      Ford-Fulkerson 可能反复使用长短不一的路径。
- chapter: 近似算法
  source: 近似算法.md
  questions:
  - id: algo-approx-001
    type: single_choice
    difficulty: core
    question: 对于最小化组合优化问题 $P$，算法 $A$ 的近似比 $r_A(I)$ 应如何定义？
    options:
    - $A(I) / OPT(I)$
    - $OPT(I) / A(I)$
    - $|A(I) - OPT(I)| / OPT(I)$
    - $|A(I) - OPT(I)| / A(I)$
    answer: 0
    explanation: 对于最小化问题，近似比定义为近似解的值与最优解的值之比，即 $r_A(I) = A(I) / OPT(I)$。对于最大化问题，则反过来定义为
      $r_A(I) = OPT(I) / A(I)$。选项A正确，B是最大化问题的定义，C和D混淆了概念。
  - id: algo-approx-002
    type: single_choice
    difficulty: core
    question: 在 $P \neq NP$ 的假设下，以下哪个问题属于**完全可近似的**？
    options:
    - 最小顶点覆盖
    - 0-1 背包问题
    - 一般货郎问题（TSP）
    - 多机调度问题
    answer: 1
    explanation: 根据笔记中的可近似性分类表，背包问题是完全可近似的（对任意小的 $\varepsilon > 0$，存在 $(1+\varepsilon)$-近似算法）。最小顶点覆盖和多机调度是可近似的（存在常数比近似算法），而一般货郎问题是不可近似的。
  - id: algo-approx-003
    type: single_choice
    difficulty: core
    question: 最小顶点覆盖的 MVC 算法的时间复杂度是多少？
    options:
    - $O(n)$，$n = |V|$
    - $O(m)$，$m = |E|$
    - $O(n \log n)$
    - $O(n + m)$
    answer: 1
    explanation: MVC算法的时间复杂度为 $O(m)$，其中 $m = |E|$ 是图的边数。这是因为算法每次选择一条边并将其两个端点加入覆盖集，然后删除相关边，每条边最多被处理一次。
  - id: algo-approx-004
    type: single_choice
    difficulty: core
    question: MVC（最小顶点覆盖）算法的近似比是多少？
    options:
    - 2
    - $2 - 1/m$
    - $3/2$
    - $1 + \varepsilon$
    answer: 0
    explanation: MVC 算法的近似比为 2。证明思路：设 $|V'| = 2k$，$V'$ 由 $k$ 条互不关联的边的端点组成。为了覆盖这 $k$
      条边至少需要 $k$ 个顶点，故 $OPT(I) \geq k$，从而 $MVC(I)/OPT(I) \leq 2k/k = 2$。
  - id: algo-approx-005
    type: single_choice
    difficulty: advanced
    question: 比较多机调度问题的 G-MPS 和 DG-MPS 算法，以下说法正确的是：
    options:
    - DG-MPS 的近似比优于 G-MPS
    - G-MPS 的近似比优于 DG-MPS
    - 两者的近似比相同，但 G-MPS 更快
    - DG-MPS 不是多项式时间算法
    answer: 0
    explanation: G-MPS 的近似比为 $2 - 1/m$，而 DG-MPS 的近似比为 $3/2 - 1/(2m)$。当 $m \geq 2$
      时，$3/2 - 1/(2m) < 2 - 1/m$，因此 DG-MPS 的近似比更优。DG-MPS 通过先按处理时间从大到小排序，改善了最坏情况下的性能。
  - id: algo-approx-006
    type: true_false
    difficulty: core
    question: 对于满足三角不等式的货郎问题，最邻近法（NN）是常数近似比算法。
    answer: false
    explanation: 错误。NN（最邻近法）的近似比不是常数。根据定理，$NN(I) \leq \frac{1}{2}(\lceil \log_2 n
      \rceil + 1) \cdot OPT(I)$，近似比与 $n$ 有关（约为 $O(\log n)$），且存在实例使得 $NN(I) > \frac{1}{3}(\log_2(n+1)
      + 4/3) \cdot OPT(I)$。因此 NN 不是常数近似比算法，不能实际应用。
  - id: algo-approx-007
    type: single_choice
    difficulty: core
    question: 对于满足三角不等式的货郎问题，最小生成树法（MST）的近似比是多少？
    options:
    - 2
    - $3/2$
    - $1 + \varepsilon$
    - $O(\log n)$
    answer: 0
    explanation: MST 算法是 2-近似算法。证明：从哈密顿回路中删去一条边得到一棵生成树，故最小生成树 $T$ 的权小于 $OPT(I)$；沿
      $T$ 走两遍得到欧拉回路，长度小于 $2 \cdot OPT(I)$；由于满足三角不等式，抄近路不会增加长度，因此 $MST(I) < 2 \cdot
      OPT(I)$。
  - id: algo-approx-008
    type: single_choice
    difficulty: advanced
    question: 对于满足三角不等式的货郎问题，最小权匹配法（MM）的近似比是多少？
    options:
    - 2
    - $3/2$
    - $1 + \varepsilon$
    - $2 - 1/m$
    answer: 1
    explanation: MM 算法是 $3/2$-近似算法。关键步骤：先求最小生成树 $T$，然后对 $T$ 的奇度顶点构成的导出子图 $H$ 求最小权匹配
      $M$，将 $M$ 加入 $T$ 得到欧拉图，再求欧拉回路并抄近路得到哈密顿回路。最小匹配 $M$ 的权不超过 $OPT(I)/2$，因此总长度小于 $(3/2)
      \cdot OPT(I)$。
  - id: algo-approx-009
    type: true_false
    difficulty: core
    question: 一般货郎问题（不要求满足三角不等式）存在常数近似比算法。
    answer: false
    explanation: 错误。一般货郎问题（不要求满足三角不等式）是**不可近似的**，除非 $P = NP$。证明思路：如果存在常数近似比 $r \leq
      K$ 的近似算法，则可以利用该算法判断图是否有哈密顿回路，从而推出 $P = NP$。只有满足三角不等式的子问题才有常数近似比算法。
  - id: algo-approx-010
    type: single_choice
    difficulty: core
    question: 0-1 背包问题的贪心算法 G-KK 的近似比是多少？
    options:
    - $1 + \varepsilon$
    - 2
    - $3/2$
    - $O(\log n)$
    answer: 1
    explanation: G-KK 是 2-近似算法。证明：设物品 $l$ 是第一件未装入背包的物品，则 $OPT(I) < G\text{-}KK(I)
      + v_l \leq G\text{-}KK(I) + v_{\max} \leq 2 \cdot G\text{-}KK(I)$。
  - id: algo-approx-011
    type: single_choice
    difficulty: advanced
    question: 关于 PTAS 和 FPTAS 的区别，以下说法正确的是：
    options:
    - PTAS 的时间复杂度与 $\varepsilon$ 无关
    - FPTAS 的时间复杂度为 $O(n^{1/\varepsilon + 2})$
    - PTAS 的时间复杂度为 $O(n^{1/\varepsilon + 2})$，当 $\varepsilon$ 很小时多项式次数很高
    - FPTAS 不是多项式时间算法
    answer: 2
    explanation: PTAS 的时间复杂度为 $O(n^{1/\varepsilon + 2})$，当 $\varepsilon$ 很小时（如 $\varepsilon
      = 0.01$），指数 $1/\varepsilon + 2 = 102$，时间复杂度为 $O(n^{102})$，这是关于 $n$ 的多项式，但多项式次数依赖于
      $1/\varepsilon$，因此 $\varepsilon$ 越小速度越慢。FPTAS 的时间复杂度为 $O(n^3(1 + 1/\varepsilon))$，是关于
      $n$ 和 $1/\varepsilon$ 的多项式，效率更高。
  - id: algo-approx-012
    type: fill_blank
    difficulty: advanced
    question: 对于多机调度问题，$m$ 台机器时，G-MPS 的近似比为 ______，DG-MPS 的近似比为 ______。
    answer:
    - $2 - \frac{1}{m}$
    - $\frac{3}{2} - \frac{1}{2m}$
    explanation: G-MPS 的近似比为 $2 - 1/m$，DG-MPS 的近似比为 $3/2 - 1/(2m)$。这两个定理是笔记中的核心结果，紧实例也验证了这些上界是可达的。
  - id: algo-approx-013
    type: short_answer
    difficulty: exam
    question: 简述货郎问题最小权匹配法（MM）的五个关键步骤。
    answer:
    - 最小生成树
    - 奇度顶点
    - 最小权匹配
    - 欧拉回路
    - 抄近路
    keywords:
    - 最小生成树
    - 奇度顶点
    - 最小权匹配
    - 欧拉回路
    - 抄近路
    explanation: MM 算法的五个关键步骤：1) 求最小生成树 $T$；2) 找出 $T$ 的所有奇度顶点，构成导出子图 $H$；3) 求 $H$
      的最小权匹配 $M$；4) 将 $M$ 加入 $T$ 得到欧拉图，求欧拉回路；5) 沿欧拉回路跳过已走过的顶点，抄近路得到哈密顿回路。
  - id: algo-approx-014
    type: single_choice
    difficulty: exam
    question: 0-1 背包问题的 FPTAS 算法的时间复杂度为：
    options:
    - $O(n^3(1 + 1/\varepsilon))$
    - $O(n^{1/\varepsilon + 2})$
    - $O(n^2 v_{\max})$
    - $O(n \log n)$
    answer: 0
    explanation: FPTAS 的时间复杂度为 $O(n^3(1 + 1/\varepsilon))$。关键分析：$v_{\max}' = \lceil
      v_{\max}/b \rceil = O(n(1+1/\varepsilon))$，动态规划算法的时间为 $O(n^2 v_{\max}')$，代入即得
      $O(n^3(1 + 1/\varepsilon))$。这是关于 $n$ 和 $1/\varepsilon$ 的多项式，因此是完全多项式时间近似方案。
  - id: algo-approx-101
    type: short_answer
    difficulty: advanced
    question: 10.1 最小顶点覆盖问题的近似算法 MVC 任取一条边，把这条边的两个端点加入顶点覆盖集。若改为只把这条边的一个端点加入顶点覆盖集，其余不变，试分析这个修改后的算法的近似性能。
    answer: 修改后的算法不再具有有界的常数近似比，其近似性能可以任意差。考虑星形图实例：中心顶点 c 与 n 个叶子相连，最优解只需选 c（大小为1），但修改后的算法可能每次都选中叶子，最终输出大小为
      n，近似比趋于无穷大。
    explanation: 星形图 G=(V,E)，V={c,v1,...,vn}，E={(c,vi)}。最优 OPT=1。若算法每一步都选中叶子 vi，则需将所有叶子加入覆盖集，ALG=n。因此
      ALG/OPT=n，当 n→∞ 时近似比无界。
    keywords:
    - 最小顶点覆盖
    - 近似算法
    - 星形图
    - 近似比
    chapter: 近似算法
    source: hw8.tex
  - id: algo-approx-103
    type: short_answer
    difficulty: advanced
    question: 10.3 装箱问题中，首次适合算法（FF）按输入顺序装物品，每只箱子装入物品总重不超过 B。证明：对装箱问题的所有实例 I，FF(I)
      < 2·OPT(I)。
    answer: 关键引理：对任意两只已打开的箱子 Si 和 Sj（i<j），有 w(Si)+w(Sj)>B。因为 Sj 中第一件物品 x 当时无法装入 Si。由此可得总重量
      W > ⌊m/2⌋·B，而 OPT ≥ ⌈W/B⌉ ≥ ⌊m/2⌋+1，故 2·OPT > m = FF。
    explanation: 设 FF 产生 m 只箱子 S1,...,Sm。对 i<j，Sj 中第一件物品 x 装入时 Si 已打开且装不下 x，故当时 Si
      重量 + wx > B，从而 w(Si)+w(Sj) > B。将所有箱子两两配对得 W > ⌊m/2⌋·B，OPT ≥ ⌈W/B⌉ ≥ ⌊m/2⌋+1，因此
      FF = m < 2·OPT。
    keywords:
    - 装箱问题
    - 首次适合算法
    - FF
    - 近似比
    chapter: 近似算法
    source: hw8.tex
  - id: algo-approx-104
    type: short_answer
    difficulty: exam
    question: 10.4 证明：装箱问题不存在近似比 r < 3/2 的多项式时间近似算法，除非 P=NP。
    answer: 从划分问题（Partition）归约。给定正整数 a1,...,an 与总和 T，若 T 为奇数直接回答否；否则构造装箱实例：物品重量 wj=aj，箱子容量
      B=T/2。划分有解当且仅当 OPT=2，无解则 OPT≥3。若存在近似比 r<3/2 的近似算法 A，则划分有解时 A(I)≤2r<3，因 A(I)
      为整数故 A(I)≤2；划分无解时 A(I)≥3。于是可用 A 在多项式时间内判定划分问题，除非 P=NP，否则不可能。
    explanation: 构造保持划分问题的答案：总重为 2B。若划分有解，则恰好用 2 只箱子装完；若无解，则至少需要 3 只。近似比 r<3/2 的算法能区分这两种情况（有解输出≤2，无解输出≥3），从而多项式时间求解
      NP-完全问题 Partition，矛盾。
    keywords:
    - 装箱问题
    - 近似比下界
    - 划分问题
    - NP完全
    chapter: 近似算法
    source: hw8.tex
  - id: algo-approx-105
    type: short_answer
    difficulty: advanced
    question: 10.5 最大割集问题中，局部改进算法 MCUT 从 V1=V, V2=∅ 开始，若存在顶点 u 其关联的非割边多于割边，则将 u 从当前侧移到另一侧。证明：对最大割集问题的每个实例
      I，OPT(I) ≤ 2·MCUT(I)。
    answer: 算法终止时，对每个顶点 u 有 d_non(u) ≤ d_cut(u)。对所有顶点求和得 Σd_non(u) ≤ Σd_cut(u)。由于每条非割边被两端点各计一次，左边等于
      2|E_non|；每条割边同样被计两次，右边等于 2|E_cut|。因此 |E_non| ≤ |E_cut|，总边数 |E| = |E_cut|+|E_non|
      ≤ 2|E_cut| = 2·MCUT。又 OPT ≤ |E|，故 OPT ≤ 2·MCUT。
    explanation: MCUT 的终止条件保证每个顶点关联的非割边数不超过割边数。通过双重计数，非割边总数不超过割边总数，从而总边数不超过两倍割边数。最优割边数不超过总边数，因此
      OPT ≤ |E| ≤ 2·MCUT。
    keywords:
    - 最大割集
    - 局部改进算法
    - 近似比
    - 双重计数
    chapter: 近似算法
    source: hw8.tex
- chapter: 问题复杂度
  source: 问题复杂度.md
  questions:
  - id: algo-complexity-001
    type: single_choice
    difficulty: core
    question: 在算法评价指标中，空间复杂性主要考虑的是以下哪一项？
    options:
    - 存储程序的空间
    - 存储输入数据的空间
    - 存储中间结果或操作单元的额外空间
    - 所有占用空间的总和
    answer: 3
    explanation: 空间复杂性主要关注额外空间（存储中间结果或操作单元所占用的空间），而非存储程序或输入数据的空间。输入数据空间通常为 O(n)，存储程序的空间一般为常数。
  - id: algo-complexity-002
    type: single_choice
    difficulty: core
    question: 在决策树模型中，算法的最坏情况时间复杂度对应于决策树的什么属性？
    options:
    - 树叶数
    - 结点数
    - 深度
    - 平均路径长度
    answer: 2
    explanation: 决策树模型中，最坏情况下的时间复杂度对应决策树的深度（从根到最深叶节点的路径长度），平均情况对应平均路径长度。结点数和树叶数反映的是问题规模，而非直接对应时间复杂度。
  - id: algo-complexity-003
    type: single_choice
    difficulty: core
    question: 对于有序表检索问题，以比较为基本运算的算法类中，最坏情况下的复杂度下界是多少？
    options:
    - ⌊log n⌋
    - ⌊log n⌋ + 1
    - ⌈log n⌉
    - ⌈log n⌉ + 1
    answer: 1
    explanation: 根据命题3，n 个结点的二叉树的深度至少为 ⌊log n⌋。因此 n 个内部结点的决策树深度至少为 ⌊log n⌋，加上根结点本身的比较，检索问题的下界为
      ⌊log n⌋ + 1 次比较。
  - id: algo-complexity-004
    type: single_choice
    difficulty: core
    question: Build-Heap（建堆）算法的时间复杂度是多少？
    options:
    - O(n)
    - O(n log n)
    - O(log n)
    - O(n^2)
    answer: 0
    explanation: 建堆过程 Build-Heap 通过对高度为 h 的层上的结点数乘以 O(h) 求和得到总复杂度。利用引理（高度 h 的层至多 n/2^{h+1}
      个结点），求和结果为 O(n)，这是一个线性时间过程。
  - id: algo-complexity-005
    type: true_false
    difficulty: core
    question: 算法越简单，其时间效率一定越高。
    answer: false
    explanation: 简单性（算法和程序结构简单）与效率并不总是正相关。笔记中明确指出：简单的算法效率不一定高，要在保证一定效率的前提下力求简单。有些高效的算法（如堆排序、快速排序）实现相对复杂。
  - id: algo-complexity-006
    type: true_false
    difficulty: core
    question: 在 n 个数的数组中找最大数，Findmax 算法是最优算法。
    answer: true
    explanation: Findmax 算法的时间复杂度 W(n) = n - 1，而找最大问题的下界也是 n - 1（因为 MAX 唯一，其余 n-1
      个数必须被淘汰，一次比较至多淘汰一个数）。上界等于下界，因此 Findmax 是最优算法。
  - id: algo-complexity-007
    type: true_false
    difficulty: core
    question: 冒泡排序的最坏情况时间复杂度为 θ(n^2)。
    answer: true
    explanation: 冒泡排序的交换只发生在相邻元素之间，每次相邻交换只消除 1 个逆序。最大逆序数为 n(n-1)/2，因此最坏情况下比较次数至少为
      n(n-1)/2，即 W(n) = Ω(n^2)。结合上界 O(n^2)，得到 W(n) = θ(n^2)。
  - id: algo-complexity-008
    type: fill_blank
    difficulty: advanced
    question: 请填写以下选择问题的比较次数下界：找最大 ____，找最大和最小 ____，找第二大 ____。
    answer:
    - n - 1
    - ⌈3n/2⌉ - 2
    - n + ⌈log n⌉ - 2
    explanation: 找最大问题的下界是 n-1（需要淘汰 n-1 个数）；找最大和最小的下界是 ⌈3n/2⌉ - 2（通过信息单位法证明）；找第二大的下界是
      n + ⌈log n⌉ - 2（锦标赛方法达到此下界，其中 n-1 是找最大所需，⌈log n⌉ - 1 是在直接输给 max 的元素中再找最大所需）。
  - id: algo-complexity-009
    type: multiple_choice
    difficulty: advanced
    question: 以下哪些排序算法在最坏情况下达到最优（时间复杂度为 O(n log n) 且阶最优）？
    options:
    - 快速排序
    - 归并排序
    - 堆排序
    - 冒泡排序
    answer:
    - 1
    - 2
    explanation: 根据笔记中的排序算法比较表：堆排序最坏 O(n log n)、平均 O(n log n)、原地工作、最优；归并排序最坏 O(n log
      n)、平均 O(n log n)、空间 O(n)、最优。快速排序最坏 O(n^2)，不是最坏最优；冒泡排序平均 O(n^2)，不是最优。
  - id: algo-complexity-010
    type: single_choice
    difficulty: advanced
    question: 问题归约方法（Q ≤_l P）的主要用途是什么？
    options:
    - 证明问题 P 的上界
    - 设计问题 P 的算法
    - 利用已知问题 Q 的下界证明问题 P 的下界
    - 证明问题 P 和 Q 等价
    answer: 3
    explanation: 问题归约方法的核心思想是：若已知问题 Q 的下界为 Ω(g(n))，且存在线性时间变换将 Q 的实例转换为 P 的实例，则 P 至少与
      Q 一样难，即 T_P(n) = Ω(g(n))。这不是为了证明 P 的上界，也不是为了设计 P 的算法，而是利用已知问题的难度推导新问题的下界。
  - id: algo-complexity-011
    type: single_choice
    difficulty: advanced
    question: Heapify 算法的时间复杂度 T(n) 满足递推式 T(n) ≤ T(2n/3) + θ(1)，其解为？
    options:
    - θ(n)
    - θ(log n)
    - θ(n log n)
    - θ(1)
    answer: 1
    explanation: Heapify 的递推不等式为 T(n) ≤ T(2n/3) + θ(1)。根据主定理（Master Theorem），a = 1,
      b = 3/2, f(n) = θ(1)，由于 n^{log_b a} = n^0 = 1，且 f(n) = θ(1) = θ(n^{log_b a})，属于
      Case 2，因此 T(n) = θ(log n)。也可以理解为堆的高度为 log n，每次递归处理子堆。
  - id: algo-complexity-012
    type: fill_blank
    difficulty: advanced
    question: 在证明找最大和最小问题的下界 ⌈3n/2⌉ - 2 时，证明中引入了“____”的概念，将比较分为决定性的和____的，最终得出下界为
      ____。
    answer:
    - 信息单位
    - 非决定性
    - ⌈3n/2⌉ - 2
    explanation: 构造最坏输入证明找最大和最小下界时，核心概念是信息单位：每增加一个 W（赢）或 L（输）标记提供一个信息单位。算法需要 2n-2
      个信息单位才能确定最大和最小。通过构造输入使每次比较获得的信息单位尽量少，从而证明任何算法至少需要 ⌈3n/2⌉ - 2 次比较。其中 Case 1（N,N
      比较）获得 2 个信息单位，其余情况获得 1 或 0 个。
  - id: algo-complexity-013
    type: single_choice
    difficulty: exam
    question: 对于 n = 1023 的有序表，二分检索在最坏情况下需要进行多少次比较？
    options:
    - 10
    - 9
    - 11
    - 1023
    answer: 0
    explanation: 二分检索的最坏情况 W(n) = ⌊log n⌋ + 1。当 n = 2^k - 1 时，⌊log(2^k - 1)⌋ + 1 =
      (k-1) + 1 = k。对于 n = 1023 = 2^10 - 1，k = 10，因此 W(1023) = 10。注意：虽然 ⌊log 1023⌋
      = 9（因为 2^9 = 512 ≤ 1023 < 1024 = 2^10），但公式是 ⌊log n⌋ + 1 = 9 + 1 = 10。
  - id: algo-complexity-014
    type: short_answer
    difficulty: exam
    question: 请简述如何利用问题归约方法证明平面最邻近点对问题（以比较为基本运算）的时间复杂度下界为 Ω(n log n)。
    answer: 通过线性时间归约，将元素唯一性问题（下界 Ω(n log n)）转换为最邻近点对问题：将 n 个数 x_1, ..., x_n 映射为平面上的
      n 个点 (x_1, 0), ..., (x_n, 0)。若最邻近点对的距离 d = 0，则存在重复元素（不唯一）；若 d > 0，则所有元素互异。由于变换
      f 和解的转换都是线性时间，若最邻近点对能在 o(n log n) 时间内解决，则元素唯一性问题也能在 o(n log n) 时间内解决，与元素唯一性问题的下界
      Ω(n log n) 矛盾。因此最邻近点对问题的时间下界为 Ω(n log n)。
    keywords:
    - 元素唯一性
    - 线性时间归约
    - Ω(n log n)
    - 距离为0
    - 矛盾
    explanation: 这是问题归约方法的经典应用。关键步骤包括：(1) 明确已知下界的问题 Q（元素唯一性，Ω(n log n)）；(2) 构造线性时间变换
      f 将 Q 的实例转换为 P（最邻近点对）的实例；(3) 说明解的反向转换也是线性时间；(4) 得出结论 T_P(n) = Ω(g(n))。具体构造是将一维数轴上的点映射到二维平面的
      x 轴上，利用距离是否为 0 判断唯一性。
- chapter: 随机算法
  source: 随机算法.md
  questions:
  - id: algo-random-001
    type: true_false
    difficulty: core
    question: Las Vegas 型随机算法若得到解，则解一定是正确的。
    answer: true
    explanation: Las Vegas 型随机算法的核心特征就是：若得到解，则解一定是正确的。它可能一次运行得不到解，但绝不会给出错误答案。这与 Monte
      Carlo 型形成对比——后者有时会给出错误答案。
  - id: algo-random-002
    type: single_choice
    difficulty: core
    question: 对含 $n$ 个不同元素的数组，随机快速排序的期望比较次数为：
    options:
    - $O(n \log n)$
    - $O(n^2)$
    - $O(n)$
    - $O(\log n)$
    answer: 0
    explanation: 随机快速排序的期望比较次数上界为 $T(n) \leq 2n \ln n$，属于 $\Theta(n \log n)$。最坏情况仍是
      $O(n^2)$，但期望是 $O(n \log n)$。
  - id: algo-random-003
    type: true_false
    difficulty: core
    question: 随机选择算法 RandSelect 的期望时间复杂度为 $O(n)$。
    answer: true
    explanation: 随机选择算法 RandSelect 的期望运行时间为 $O(n)$。证明思路：假设第 $k$ 小元素总是出现在划分后较大的数组中，得到递推式
      $T(n) \leq \frac{2}{n}\sum_{i=\lceil n/2\rceil}^{n-1} T(i) + O(n)$，归纳可证 $T(n)
      \leq cn$。
  - id: algo-random-004
    type: fill_blank
    difficulty: advanced
    question: 随机选择算法 RandSelect 在保守假设下的期望时间递推式为：$T(n) \leq$ ______。
    answer: $\frac{2}{n}\sum_{i=\lceil n/2\rceil}^{n-1} T(i) + O(n)$
    explanation: 在保守假设下（第 $k$ 小元素总是出现在较大的一半），随机选择算法的期望时间递推式为 $T(n) \leq \frac{2}{n}\sum_{i=\lceil
      n/2\rceil}^{n-1} T(i) + O(n)$。这是因为枢轴位置在较大一半的概率为 $2/n$，而较大一半的大小从 $\lceil n/2\rceil$
      到 $n-1$。
  - id: algo-random-005
    type: single_choice
    difficulty: core
    question: 随机 $n$ 后放置算法 BoolQueen 属于哪类随机算法？
    options:
    - Las Vegas 型
    - Monte Carlo 型
    - 确定性算法
    - 近似算法
    answer: 0
    explanation: BoolQueen 是 Las Vegas 型算法：它通过随机选择放置皇后，若成功放置 $n$ 个皇后则得到正确解；若失败则返回
      count < n。它不会给出错误答案，只是可能找不到解。
  - id: algo-random-006
    type: single_choice
    difficulty: advanced
