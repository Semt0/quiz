<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Semt0 的独立复习题库 — 交互式练习、计时测验、错题本与掌握度统计" />
    <meta name="theme-color" content="#0ea5e9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e1b2e" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Semt0's Quiz · 复习题库</title>
    <script>
      // 在首屏前应用主题，避免闪烁
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('quiz:settings') || '{}');
          var theme = s.theme || 'auto';
          var dark =
            theme === 'dark' ||
            (theme === 'auto' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
